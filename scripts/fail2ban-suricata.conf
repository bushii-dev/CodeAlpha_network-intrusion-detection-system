# /etc/fail2ban/jail.d/suricata.conf
# Bans source IPs that trigger Suricata alerts logged to fast.log.
# Requires the matching filter at /etc/fail2ban/filter.d/suricata.conf
# with a failregex that matches your fast.log alert format.

[suricata]
enabled  = true
filter   = suricata
logpath  = /var/log/suricata/fast.log
action   = iptables-allports[name=suricata]
maxretry = 1
bantime  = 3600
findtime = 600
